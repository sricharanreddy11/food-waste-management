{% extends "index.html" %}

{%block block%}

<div class="container">
 <div class="row justify-content-center ">
  <div class="form-group col-md-5 col-md-offset-7 align-center ">

    <div class = "container">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
  <div class="mb-3">
    <label for="donor-name" class="form-label">Contributor-Name: </label>
    <input type="text" class="form-control" required id="donor-name" aria-describedby="emailHelp" name="donor_name">
  </div>
  <div class="mb-3">
    <label for="floatingTextarea">Address: </label>
    <textarea class="form-control" required placeholder="Add the respective Address to Visit" id="floatingTextarea" name="address"></textarea>
  </div>
  <div class="mb-3">
    <label for="phone" class="form-label">Phone Number: </label>
    <input type="text" class="form-control" required id="phone" aria-describedby="emailHelp" name="phone">
  </div>
  <div class="mb-3">
    <label for="email" class="form-label">Email-Id: </label>
    <input type="email" class="form-control" required id="email" aria-describedby="emailHelp" name="email">
  </div>
  <div class="mb-3">
    <label for="people" class="form-label">No. Of People : </label>
    <input type="number" class="form-control" required id="people" aria-describedby="emailHelp" name="people">
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    </div>
      </div>
 </div>
</div>

{% endblock %}
