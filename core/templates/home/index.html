<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FWM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" >
</head>
<body>


<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Food Waste Management</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/dashboard/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/contribute/">Contribute</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/available/">Deliver</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <div style="padding : 10px">
          {% if request.user.is_authenticated%}
          {{request.user.first_name}} {{request.user.last_name}}
          {% endif %}
        </div>
        {% if request.user.is_authenticated%}
            <a href="/logout_page/" class="btn btn-outline-success" type="submit">Logout</a>
        {%else%}
            <a href="/login_page/" class="btn btn-outline-success" type="submit">Login</a>
        {% endif %}
      </form>
    </div>
  </div>
</nav>
<br>
<br>

{%block block%}

        {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
